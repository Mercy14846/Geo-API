site_name: GeoAfrica SDK
site_description: Unified geospatial data SDK for Africa and the world
site_author: Merczcord Technologies Ltd.
site_url: https://geoafrica.readthedocs.io
repo_url: https://github.com/Mercy14846/Geo-API
repo_name: Mercy14846/Geo-API

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/logo.png

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Datasets:
    - Boundaries: datasets/boundaries.md
    - Population: datasets/population.md
    - OpenStreetMap: datasets/osm.md
    - Climate: datasets/climate.md
    - Fire: datasets/fire.md
    - Elevation: datasets/elevation.md
    - Health Facilities: datasets/health.md
    - Satellite Imagery: datasets/satellite.md
    - Humanitarian Data: datasets/humanitarian.md
    - Roads: datasets/roads.md
  - Analysis: analysis.md
  - Visualization: visualization.md
  - CLI Reference: cli.md
  - API Reference: api_reference.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
